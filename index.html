    <style>

:root {
    --primary-color: rgba(255,255,255,0.15);
    --secondary-color: rgba(255,255,255,0.25);
    --bg-color: #0f172a;
    --text-color: #ffffff;
    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: rgba(0,0,0,0.35);
}

body {
    font-family: 'Cairo', sans-serif;
    background:
        radial-gradient(circle at top right, #2563eb 0%, transparent 30%),
        radial-gradient(circle at bottom left, #7c3aed 0%, transparent 30%),
        linear-gradient(135deg, #0f172a, #111827);
    color: var(--text-color);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    overflow-x: hidden;
}

.bg-blur {
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(168,85,247,0.35), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(236,72,153,0.25), transparent 25%);
    filter: blur(80px);
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

header h1 {
    font-size: 2rem;
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

.search-box {
    position: sticky;
    top: 15px;
    z-index: 100;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-border);
    box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 1px rgba(255,255,255,0.2);
    padding: 18px;
    border-radius: 24px;
    margin-bottom: 25px;
}

input[type="text"] {
    width: 100%;
    padding: 14px 20px;
    font-size: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    border-radius: 18px;
    box-sizing: border-box;
    outline: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: 0.3s ease;
    font-family: 'Cairo', sans-serif;
}

input[type="text"]::placeholder {
    color: rgba(255,255,255,0.6);
}

input[type="text"]:focus {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.wishes-list {
    display: grid;
    gap: 16px;
}

.wish-item {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 15px 18px;
    border-radius: 22px;
    box-shadow:
        0 8px 20px rgba(0,0,0,0.2),
        inset 0 1px 1px rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.3s ease;
}

.wish-item:hover {
    transform: translateY(-4px) scale(1.01);
    background: rgba(255,255,255,0.14);
    box-shadow:
        0 12px 28px rgba(0,0,0,0.3),
        inset 0 1px 1px rgba(255,255,255,0.18);
}

.wish-number {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    color: white;
    min-width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid rgba(255,255,255,0.2);
}

.wish-text {
    flex-grow: 1;
    font-size: 16px;
    line-height: 1.7;
}

.google-maps-btn {
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.3s ease;
}

.google-maps-btn:hover {
    transform: scale(1.12) rotate(4deg);
    background: rgba(255,255,255,0.18);
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

.google-maps-btn svg {
    width: 28px;
    height: 28px;
}

.no-results {
    text-align: center;
    padding: 50px;
    color: rgba(255,255,255,0.6);
    display: none;
}

footer {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
}

</style>
</head>

    const wishes = rawData.split('\n').filter(line => line.trim() !== "");
    const container = document.getElementById('wishesContainer');
    const countSpan = document.getElementById('count');

    function displayWishes(items) {
        container.innerHTML = "";
        items.forEach((text, index) => {
            const searchQuery = encodeURIComponent(text);
            const mapUrl = `https://www.google.com/maps/search/${searchQuery}`;

            const div = document.createElement('div');
            div.className = 'wish-item';
            
            div.innerHTML = `
                <span class="wish-number">${index + 1}</span> 
                <span class="wish-text">${text}</span>
                <a href="${mapUrl}" target="_blank" class="google-maps-btn" title="فتح في خرائط جوجل">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zM7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 2.88-2.88 7.19-5 9.88C9.08 16.19 7 11.88 7 9z"/>
                        <circle fill="#EA4335" cx="12" cy="9" r="2.5"/>
                    </svg>
                </a>
            `;
            container.appendChild(div);
        });
        countSpan.innerText = items.length;
    }

    displayWishes(wishes);

    function filterWishes() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = wishes.filter(item => item.toLowerCase().includes(query));
        displayWishes(filtered);
        document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
    }
</script>
